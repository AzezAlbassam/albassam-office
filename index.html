<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Albassam — Private Family Office</title>
<meta name="description" content="Albassam family office — private portfolio ledger.">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Crect x='9' y='9' width='18' height='18' fill='none' stroke='%23C8A96E'/%3E%3Crect x='9' y='9' width='18' height='18' fill='none' stroke='%23C8A96E' transform='rotate(45 18 18)'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Inter:wght@400;500;600&family=Marcellus&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div class="mark" aria-hidden="true">
      <svg width="38" height="38" viewBox="0 0 36 36">
        <rect x="9" y="9" width="18" height="18" fill="none" stroke="#C8A96E" stroke-width="1"/>
        <rect x="9" y="9" width="18" height="18" fill="none" stroke="#C8A96E" stroke-width="1" transform="rotate(45 18 18)"/>
        <circle cx="18" cy="18" r="2.2" fill="#C8A96E"/>
      </svg>
    </div>
    <h1>ALBASSAM</h1>
    <div class="descriptor"><span class="rule"></span><span class="t">Private family office</span><span class="rule"></span></div>
    <div class="arabic">مكتب عائلة البسّام</div>
  </header>

  <div class="modebar">
    <span class="pill">Family view · live</span>
    <span class="pill demo" data-demo-pill hidden>Demo data</span>
  </div>

  <div id="loading" class="skel">Opening the registry…</div>

  <main id="main-shell" hidden>
    <div class="seal-stage" id="seal"></div>
    <div class="stats" id="stats" data-needs-office></div>

    <section class="sect" data-needs-office>
      <h2>Members · <span id="member-count"></span></h2>
      <div class="members" id="members"></div>
    </section>

    <section class="sect" data-needs-office>
      <h2>Portfolio history</h2>
      <div class="chart-wrap" id="chart"></div>
      <div class="hist-list" id="hist-list"></div>
    </section>

    <section class="sect" data-needs-office>
      <h2>Ledger</h2>
      <div class="ledger" id="ledger"></div>
    </section>
  </main>

  <footer>
    Albassam <span class="sep">·</span> Est. 2026 <span class="sep">·</span> Family wealth, stewarded
  </footer>
</div>
<div id="modal-host"></div>
<script type="module">
  import { boot } from "./js/app.js";
  boot({ edit: false });
</script>
</body>
</html>
